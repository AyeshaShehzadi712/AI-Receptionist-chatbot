<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Integrity Air — Chat</title>
<style>
  :root {
    --brand: #2f5fd0;
    --brand-dark: #234aa3;
    --bg: #f4f6fb;
    --panel: #ffffff;
    --ai: #eef2fb;
    --text: #1c2536;
    --muted: #7a869a;
    --border: #e4e8f0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .chat {
    width: 100%;
    max-width: 460px;
    height: 100vh;
    max-height: 760px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(20, 35, 70, 0.14);
  }
  .header {
    background: linear-gradient(135deg, var(--brand), var(--brand-dark));
    color: #fff;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  .header .status { font-size: 12px; opacity: 0.85; display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #57e389; }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .row.ai .bubble { background: var(--ai); border-bottom-left-radius: 4px; }
  .row.user .bubble { background: var(--brand); color: #fff; border-bottom-right-radius: 4px; }
  .typing .bubble { color: var(--muted); }
  .typing span {
    display: inline-block; width: 6px; height: 6px; margin: 0 1px;
    background: var(--muted); border-radius: 50%; opacity: 0.4;
    animation: blink 1.2s infinite both;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }
  .composer {
    border-top: 1px solid var(--border);
    padding: 12px;
    display: flex;
    gap: 8px;
    background: var(--panel);
  }
  .composer input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 11px 16px;
    font-size: 14px;
    outline: none;
  }
  .composer input:focus { border-color: var(--brand); }
  .composer button {
    border: none;
    background: var(--brand);
    color: #fff;
    width: 44px; height: 44px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .composer button:disabled { opacity: 0.5; cursor: default; }
  .footer { text-align: center; font-size: 11px; color: var(--muted); padding: 6px 0 10px; }
</style>
</head>
<body>
  <div class="chat">
    <div class="header">
      <div class="avatar">💬</div>
      <div>
        <h1>Integrity Air Conditioning &amp; Heating</h1>
        <div class="status"><span class="dot"></span> We typically reply instantly</div>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="composer">
      <input id="input" type="text" placeholder="Ask about our services, hours, or book a visit…" autocomplete="off" />
      <button id="send" title="Send">➤</button>
    </div>
    <div class="footer">Powered by your AI receptionist</div>
  </div>

<script>
  // If you host this file separately from the API, set the full origin here,
  // e.g. const API_BASE = "https://your-ngrok-id.ngrok-free.app";
  const API_BASE = "https://3480-139-135-44-185.ngrok-free.app";

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendEl = document.getElementById("send");

  // Persist the session so a page refresh continues the same lead/conversation.
  let sessionId = localStorage.getItem("chat_session_id");
  if (!sessionId) {
    sessionId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random())).replace(/-/g, "");
    localStorage.setItem("chat_session_id", sessionId);
  }

  function addBubble(text, who) {
    const row = document.createElement("div");
    row.className = "row " + who;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function addTyping() {
    const row = document.createElement("div");
    row.className = "row ai typing";
    row.id = "typing";
    row.innerHTML = '<div class="bubble"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = "";
    sendEl.disabled = true;
    addBubble(text, "user");
    addTyping();

    try {
      const res = await fetch(API_BASE + "/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      const data = await res.json();
      removeTyping();
      if (data.session_id) {
        sessionId = data.session_id;
        localStorage.setItem("chat_session_id", sessionId);
      }
      addBubble(data.reply || "Sorry, something went wrong. Please try again.", "ai");
    } catch (e) {
      removeTyping();
      addBubble("Network error — please try again in a moment.", "ai");
    } finally {
      sendEl.disabled = false;
      inputEl.focus();
    }
  }

  sendEl.addEventListener("click", send);
  inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

  // Greeting.
  addBubble("Hi! I'm the virtual assistant for Integrity Air Conditioning & Heating. How can I help — service questions, hours, or scheduling a visit?", "ai");
  inputEl.focus();
</script>
</body>
</html>
